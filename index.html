<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --tg-blue: #2481cc; --bg: #0f0f0f; }
        body { background: var(--bg); color: white; padding: 15px; font-family: sans-serif; }
        h1, h3 { color: var(--tg-blue); text-align: center; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        button { width: 100%; padding: 15px 5px; border: none; border-radius: 10px; background: #1c1c1c; 
                 color: var(--tg-blue); font-weight: bold; border: 1px solid var(--tg-blue); cursor: pointer; }
        .page { display: none; } .active { display: block; }
    </style>
</head>
<body>
    <div id="main" class="page active">
        <h1>🌟 Starsio Store</h1>
        <div class="menu-grid">
            <button onclick="tg.sendData('Premium')">💎 Premium</button>
            <button onclick="tg.sendData('Gift')">🎁 Gift</button>
            <button onclick="tg.sendData('Stars')">⭐ Stars</button>
            <button onclick="window.open('https://t.me/saiduz', '_blank')">👮‍♂️ Yordam</button>
        </div>
    </div>
    <script>
        let tg = window.Telegram.WebApp; tg.expand();
    </script>
</body>
</html>
